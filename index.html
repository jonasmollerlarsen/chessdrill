<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Drill</title>
<style>
    :root {
        --bg-1: #f5f7fb;
        --bg-2: #e6ecf7;
        --card: #ffffff;
        --ink: #1e2a3a;
        --muted: #5e6e82;
        --accent: #1f6feb;
        --accent-2: #0e4fc4;
        --border: #d8e2f0;
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        height: 100%;
    }

    body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
            radial-gradient(circle at 20% 20%, rgba(31, 111, 235, 0.12), transparent 45%),
            radial-gradient(circle at 80% 15%, rgba(14, 79, 196, 0.12), transparent 40%),
            linear-gradient(160deg, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 10px;
        overflow: hidden;
    }

    .app {
        width: min(100%, 820px);
        height: min(100%, calc(100dvh - 20px));
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 12px 32px rgba(21, 42, 78, 0.16);
        padding: 12px;
        overflow: hidden;
    }

    h1 {
        margin: 0 0 6px;
        font-size: clamp(1.25rem, 2.1vw, 1.75rem);
        letter-spacing: 0.02em;
        text-align: center;
    }

    .subtitle {
        margin: 0 0 18px;
        text-align: center;
        color: var(--muted);
    }

    #board {
        display: block;
        width: min(100%, 600px, calc(100dvh - 230px));
        margin: 0 auto 6px;
        border-radius: 10px;
        overflow: hidden;
    }

    .controls {
        display: flex;
        justify-content: center;
        margin-top: 10px;
    }

    #load-btn {
        border: none;
        border-radius: 10px;
        padding: 9px 14px;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(31, 111, 235, 0.28);
        transition: transform 120ms ease, box-shadow 120ms ease;
    }

    #load-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(31, 111, 235, 0.3);
    }

    #load-btn:active {
        transform: translateY(0);
    }

    #fen-display {
        max-width: 600px;
        margin: 4px auto 0;
        padding: 7px 10px;
        border-radius: 10px;
        background: #f7f9fd;
        border: 1px solid var(--border);
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.82rem;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    #text-display,
    #url-display {
        max-width: 600px;
        margin: 4px auto 0;
        color: var(--muted);
        text-align: center;
        font-size: 0.84rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    #url-display {
        display: block;
        color: var(--accent-2);
        text-decoration: none;
        word-break: break-all;
    }

    #url-display:hover {
        text-decoration: underline;
    }

    .attribution {
        margin: 8px 0 0;
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
    }

    .attribution a {
        color: var(--accent-2);
        text-decoration: none;
        font-weight: 600;
    }

    .attribution a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>
<main class="app">
    <h1>♟ Chess Drill ♟</h1>

<script type="module" src="https://unpkg.com/chessboard-element?module"></script>

<chess-board id="board"></chess-board>

<p id="fen-display"></p>
<p id="text-display"></p>
<a id="url-display" href="" target="_blank" rel="noopener noreferrer"></a>

<div class="controls">
    <button id="load-btn" type="button">Load New Position</button>
</div>

<p class="attribution">
    This site uses <a href="https://github.com/justinfagnani/chessboard-element?tab=License-1-ov-file" target="_blank" rel="noopener noreferrer">chessboard-element</a>.
    Copyright © 2019 Justin Fagnani
</p>
</main>

<script type="module">
const board = document.getElementById('board');
const fenDisplay = document.getElementById('fen-display');
const textDisplay = document.getElementById('text-display');
const urlDisplay = document.getElementById('url-display');
const loadBtn = document.getElementById('load-btn');
const fallbackEntry = {
    fen: 'rn1qkb1r/ppp1pppp/5n2/8/2B5/2N2Q2/PPPP1PPP/R1B1K2R w KQkq - 1 7',
    text: '',
    url: 'https://lichess.org/FeTnXmgM/white#12',
};
let cachedPositions = null;

function setBoardPosition(entry) {
    board.setAttribute('position', entry.fen.split(' ')[0]);
    fenDisplay.textContent = `FEN: ${entry.fen}`;

    if (entry.text) {
        textDisplay.textContent = `Text: ${entry.text}`;
        textDisplay.style.display = 'block';
    } else {
        textDisplay.textContent = '';
        textDisplay.style.display = 'none';
    }

    if (entry.url) {
        urlDisplay.href = entry.url;
        urlDisplay.textContent = `URL: ${entry.url}`;
        urlDisplay.style.display = 'block';
    } else {
        urlDisplay.removeAttribute('href');
        urlDisplay.textContent = '';
        urlDisplay.style.display = 'none';
    }
}

function applyFallback(reason) {
    setBoardPosition(fallbackEntry);
    fenDisplay.textContent = `FEN: ${fallbackEntry.fen} (${reason})`;
}

function parsePositionEntries(text) {
    return text
        .split(/\r?\n\s*\r?\n+/)
        .map((block) => block.trim())
        .filter(Boolean)
        .map((block) => {
            const entry = {};

            block
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean)
                .forEach((line) => {
                    const colonIndex = line.indexOf(':');
                    if (colonIndex === -1) {
                        return;
                    }

                    const key = line.slice(0, colonIndex).trim().toLowerCase();
                    const value = line.slice(colonIndex + 1).trim();

                    if (key === 'fen') {
                        entry.fen = value;
                    } else if (key === 'text') {
                        entry.text = value;
                    } else if (key === 'url') {
                        entry.url = value;
                    }
                });

            return entry;
        })
        .filter((entry) => entry.fen);
}

async function getPositions() {
    if (cachedPositions) {
        return cachedPositions;
    }

    const response = await fetch('positions.txt', { cache: 'no-cache' });
    if (!response.ok) {
        throw new Error('Failed to load positions.txt');
    }

    const text = await response.text();
    const positions = parsePositionEntries(text);

    if (positions.length === 0) {
        throw new Error('No FEN positions found in positions.txt');
    }

    cachedPositions = positions;
    return positions;
}

async function loadRandomPosition() {
    if (window.location.protocol === 'file:') {
        applyFallback('Using 3rd entry fallback; open with http://localhost to load positions.txt');
        return;
    }

    try {
        const positions = await getPositions();
        const randomEntry = positions[Math.floor(Math.random() * positions.length)];
        setBoardPosition(randomEntry);
    } catch (error) {
        // Fallback keeps the page functional if file loading fails.
        applyFallback('Using 3rd entry fallback; could not load positions.txt');
        console.error(error);
    }
}

loadBtn.addEventListener('click', loadRandomPosition);
loadRandomPosition();
</script>
</body>
</html>
