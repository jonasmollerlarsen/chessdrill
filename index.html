<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blunder Driller</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>♟</text></svg>">
    <link rel="stylesheet" href="style.css">
    <!-- Load Dependencies -->
    <script type="module" src="https://unpkg.com/chessboard-element?module"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>♟ Blunder Driller ♟</h1>
    </header>
    <div class="container">
        <div id="board-area">
            <div id="turn-area">
                <div id="status-msg" role="status" aria-live="polite">Enter username to start</div>
                <div id="board-controls">
                    <button id="next-btn" type="button" title="Load another puzzle from your active pool">Next Puzzle</button>
                </div>
            </div>
            <chess-board id="board" draggable-pieces position="start"></chess-board>
            <div id="metadata-display" class="panel"></div>
        </div>

        <div class="sidebar">
            <div id="positions-list" class="panel">
                <div id="positions-content">-</div>
            </div>
            <div id="stats">
                # Puzzles: <span id="puzzle-count">0</span>
            </div>
            <div id="data-controls" class="panel">
                <input type="text" id="username" placeholder="Lichess Username" autocomplete="off" spellcheck="false">
                <input type="number" id="max-positions" min="1" step="1" value="3" title="Maximum number of puzzle positions to keep locally" aria-label="Maximum positions to keep">
                <button id="fetch-btn" type="button" title="Fetch recent analyzed games and import blunder positions">Import Positions</button>
                <button id="clear-btn" type="button" title="Delete all locally stored puzzle data">Delete Data</button>
            </div>
            <button id="debug-toggle-btn" type="button" title="Show debug details including localStorage contents">Show localStorage</button>
            <div id="debug-panel" class="panel">
                <h3>Debug</h3>
                <div>Correct Move: <span id="debug-correct-move">-</span></div>
                <div>localStorage fullness: <span id="localstorage-fullness">-</span></div>
                <div>localStorage.blunders:</div>
                <pre id="localstorage-state">[]</pre>
            </div>
        </div>
    </div>
    <script defer src="script.js"></script>
</body>
</html>
