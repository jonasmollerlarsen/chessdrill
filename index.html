<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Drill</title>
<style>
    :root {
        --bg-1: #f5f7fb;
        --bg-2: #e6ecf7;
        --card: #ffffff;
        --ink: #1e2a3a;
        --muted: #5e6e82;
        --accent: #1f6feb;
        --accent-2: #0e4fc4;
        --border: #d8e2f0;
    }

    * {
        box-sizing: border-box;
    }

    html,
    body {
        height: 100%;
    }

    body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
            radial-gradient(circle at 20% 20%, rgba(31, 111, 235, 0.12), transparent 45%),
            radial-gradient(circle at 80% 15%, rgba(14, 79, 196, 0.12), transparent 40%),
            linear-gradient(160deg, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 10px;
        overflow: hidden;
    }

    .app {
        width: min(100%, 820px);
        height: min(100%, calc(100dvh - 20px));
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 12px 32px rgba(21, 42, 78, 0.16);
        padding: 12px;
        overflow: hidden;
    }

    h1 {
        margin: 0 0 6px;
        font-size: clamp(1.25rem, 2.1vw, 1.75rem);
        letter-spacing: 0.02em;
        text-align: center;
    }

    .subtitle {
        margin: 0 0 18px;
        text-align: center;
        color: var(--muted);
    }

    #board {
        display: block;
        width: min(100%, 520px, calc(100dvh - 110px));
        margin: 0;
        border-radius: 10px;
        overflow: hidden;
    }

    .content-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(240px, 280px);
        gap: 10px;
        align-items: start;
    }

    .board-pane {
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    .info-pane {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
    }

    .controls {
        display: flex;
        justify-content: stretch;
        margin-top: 2px;
    }

    #load-btn {
        border: none;
        border-radius: 10px;
        padding: 9px 14px;
        width: 100%;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(31, 111, 235, 0.28);
        transition: transform 120ms ease, box-shadow 120ms ease;
    }

    #load-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(31, 111, 235, 0.3);
    }

    #load-btn:active {
        transform: translateY(0);
    }

    #text-display,
    #url-display {
        width: 100%;
        margin: 0;
        color: var(--muted);
        text-align: left;
        font-size: 0.84rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    #url-display {
        display: block;
        color: var(--accent-2);
        text-decoration: none;
        word-break: break-all;
    }

    #url-display:hover {
        text-decoration: underline;
    }

    #best-move-display {
        width: 100%;
        margin: 0;
        padding: 7px 10px;
        border-radius: 10px;
        background: #eef6ff;
        border: 1px solid #c0d8f8;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.88rem;
        color: var(--ink);
        display: flex;
        flex-direction: column;
        gap: 3px;
    }

    .best-move-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
    }

    .best-move-rank {
        color: var(--muted);
        min-width: 1.5ch;
    }

    .best-move-eval {
        color: var(--accent-2);
        font-weight: 600;
        min-width: 6ch;
        text-align: right;
    }

    #user-move-display {
        width: 100%;
        margin: 0;
        padding: 7px 10px;
        border-radius: 10px;
        background: #f0faf0;
        border: 1px solid #b6ddb6;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.88rem;
        text-align: center;
        color: var(--ink);
        display: none;
    }

    #user-move-display.correct {
        background: #e7f7ea;
        border-color: #86c794;
    }

    #user-move-display.incorrect {
        background: #fff2f2;
        border-color: #e1a9a9;
    }

    #stats-display {
        width: 100%;
        margin: 0;
        padding: 7px 10px;
        border-radius: 10px;
        background: #fff8e9;
        border: 1px solid #ecd9a8;
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.84rem;
        color: var(--ink);
        text-align: left;
    }

    .attribution {
        margin: 8px 0 0;
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
    }

    .attribution a {
        color: var(--accent-2);
        text-decoration: none;
        font-weight: 600;
    }

    .attribution a:hover {
        text-decoration: underline;
    }

    @media (max-width: 760px) {
        .content-layout {
            grid-template-columns: 1fr;
        }

        .info-pane {
            width: min(100%, 520px);
            margin: 0 auto;
        }

        #text-display,
        #url-display {
            text-align: center;
        }
    }
</style>
</head>
<body>
<main class="app">
    <h1>♟ Chess Drill ♟</h1>

<script type="module" src="https://unpkg.com/chessboard-element?module"></script>

<section class="content-layout">
    <div class="board-pane">
        <chess-board id="board" draggable-pieces></chess-board>
    </div>

    <aside class="info-pane">
        <a id="url-display" href="" target="_blank" rel="noopener noreferrer"></a>
        <p id="text-display"></p>
        <p id="stats-display"></p>
        <p id="user-move-display"></p>
        <p id="best-move-display"></p>

        <div class="controls">
            <button id="load-btn" type="button">Next Position</button>
        </div>
    </aside>
</section>

<p class="attribution">
    This site uses <a href="https://github.com/justinfagnani/chessboard-element?tab=License-1-ov-file" target="_blank" rel="noopener noreferrer">chessboard-element</a>.
    Copyright © 2019 Justin Fagnani
</p>
</main>

<script type="module">
import { Chess } from 'https://cdn.jsdelivr.net/npm/chess.js@1.4.0/+esm';

const board = document.getElementById('board');
const bestMoveDisplay = document.getElementById('best-move-display');
const userMoveDisplay = document.getElementById('user-move-display');
const textDisplay = document.getElementById('text-display');
const statsDisplay = document.getElementById('stats-display');
const urlDisplay = document.getElementById('url-display');
const loadBtn = document.getElementById('load-btn');
const fallbackEntry = {
    fen: 'rn1qkb1r/ppp1pppp/5n2/8/2B5/2N2Q2/PPPP1PPP/R1B1K2R w KQkq - 1 7',
    text: '',
    url: 'https://lichess.org/FeTnXmgM/white#12',
};
let cachedPositions = null;
let currentBestMove = null;
let currentFen = null;
let currentPositionUrl = null;
let hasScoredCurrentPosition = false;
const CACHE_TTL_MS = 24 * 60 * 60 * 1000;
const EVAL_CACHE_TTL_MS = 6 * 60 * 60 * 1000;
const FEN_CACHE_KEY = 'chessdrill-fen-cache-v1';
const EVAL_CACHE_KEY = 'chessdrill-eval-cache-v1';
const POSITION_STATS_KEY = 'chessdrill-position-stats-v1';

function loadPersistentCache(key) {
    try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : {};
    } catch {
        return {};
    }
}

function savePersistentCache(key, cacheObj) {
    try {
        localStorage.setItem(key, JSON.stringify(cacheObj));
    } catch {
        // Ignore storage quota/privacy mode failures.
    }
}

const fenCache = loadPersistentCache(FEN_CACHE_KEY);
const evalCache = loadPersistentCache(EVAL_CACHE_KEY);
const positionStats = loadPersistentCache(POSITION_STATS_KEY);

function getPositionStats(url) {
    if (!url) {
        return { correct: 0, incorrect: 0 };
    }
    return positionStats[url] || { correct: 0, incorrect: 0 };
}

function savePositionStats() {
    savePersistentCache(POSITION_STATS_KEY, positionStats);
}

function incrementPositionStat(url, isCorrect) {
    if (!url) {
        return;
    }
    const current = getPositionStats(url);
    positionStats[url] = {
        correct: current.correct + (isCorrect ? 1 : 0),
        incorrect: current.incorrect + (isCorrect ? 0 : 1),
    };
    savePositionStats();
}

function renderStats(url) {
    if (!url) {
        statsDisplay.textContent = 'Score: unavailable (missing URL)';
        return;
    }
    const stats = getPositionStats(url);
    statsDisplay.textContent = `Score: ${stats.correct} correct / ${stats.incorrect} incorrect`;
}

function getCachedValue(cacheObj, key) {
    const item = cacheObj[key];
    if (!item) return null;
    if (Date.now() > item.expiresAt) {
        delete cacheObj[key];
        return null;
    }
    return item.value;
}

function setCachedValue(cacheObj, storageKey, key, value, ttlMs) {
    cacheObj[key] = {
        value,
        expiresAt: Date.now() + ttlMs,
    };
    savePersistentCache(storageKey, cacheObj);
}

const PIECE_SYMBOLS = {
    wK: '♔', wQ: '♕', wR: '♖', wB: '♗', wN: '♘', wP: '♙',
    bK: '♚', bQ: '♛', bR: '♜', bB: '♝', bN: '♞', bP: '♟',
};

board.addEventListener('drop', async (e) => {
    const { source, target, piece } = e.detail;
    if (!source || !target || target === 'offboard') return;

    if (currentFen) {
        await loadBestMove(currentFen);
    }

    const selectedMove = `${source}${target}`.toLowerCase();
    const isBestMove = currentBestMove && selectedMove === currentBestMove;
    const symbol = PIECE_SYMBOLS[piece] ?? piece;
    userMoveDisplay.classList.remove('correct', 'incorrect');
    if (isBestMove) {
        userMoveDisplay.classList.add('correct');
    } else {
        userMoveDisplay.classList.add('incorrect');
    }
    if (currentBestMove && !hasScoredCurrentPosition) {
        incrementPositionStat(currentPositionUrl, !!isBestMove);
        renderStats(currentPositionUrl);
        hasScoredCurrentPosition = true;
    }
    const verdict = isBestMove ? 'BEST MOVE' : `Not best (best: ${currentBestMove ?? 'unknown'})`;
    userMoveDisplay.textContent = `Your move: ${symbol} ${source} -> ${target} | ${verdict}`;
    userMoveDisplay.style.display = 'block';
});

// Expand piece-placement-only FEN to a full FEN (assume white to move, all castling).
function normaliseFen(fen) {
    return fen.trim().split(' ').length === 1 ? `${fen} w KQkq - 0 1` : fen;
}

function formatEval(pv) {
    if (pv.mate != null) return `#${pv.mate}`;
    if (pv.cp  != null) return `${pv.cp > 0 ? '+' : ''}${(pv.cp / 100).toFixed(2)}`;
    return '?';
}

async function loadBestMove(fen) {
    currentBestMove = null;
    bestMoveDisplay.innerHTML = '<span>Best moves: …</span>';
    bestMoveDisplay.style.display = 'flex';
    try {
        const normalisedFen = normaliseFen(fen);
        const url = `https://lichess.org/api/cloud-eval?fen=${encodeURIComponent(normalisedFen)}&multiPv=2`;
        const cachedEval = getCachedValue(evalCache, normalisedFen);
        const data = cachedEval || await (async () => {
            const res = await fetch(url);
            if (!res.ok) throw new Error('eval unavailable');
            const json = await res.json();
            setCachedValue(evalCache, EVAL_CACHE_KEY, normalisedFen, json, EVAL_CACHE_TTL_MS);
            return json;
        })();
        const depth = data?.depth ?? '?';
        const pvs = data?.pvs ?? [];
        if (pvs.length === 0) {
            bestMoveDisplay.innerHTML = '<span>Best moves: not found</span>';
            return;
        }
        currentBestMove = pvs?.[0]?.moves?.split(' ')?.[0]?.toLowerCase() ?? null;
        bestMoveDisplay.innerHTML = pvs.map((pv, i) => {
            const move = pv.moves?.split(' ')?.[0] ?? '?';
            const ev = formatEval(pv);
            return `<span class="best-move-row">`
                 + `<span class="best-move-rank">${i + 1}.</span>`
                 + `<span>${move}</span>`
                 + `<span class="best-move-eval">${ev}</span>`
                 + `</span>`;
        }).join('') + `<span style="color:var(--muted);font-size:0.78rem;align-self:flex-end">depth ${depth}</span>`;
    } catch {
        bestMoveDisplay.innerHTML = '<span>Best moves: unavailable</span>';
    }
}

function setBoardPosition(entry) {
    currentFen = entry.fen;
    currentPositionUrl = entry.url || null;
    hasScoredCurrentPosition = false;
    board.setAttribute('position', entry.fen.split(' ')[0]);
    bestMoveDisplay.style.display = 'none';
    bestMoveDisplay.innerHTML = '';
    userMoveDisplay.classList.remove('correct', 'incorrect');
    userMoveDisplay.style.display = 'none';
    userMoveDisplay.textContent = '';

    if (entry.text) {
        textDisplay.textContent = `Text: ${entry.text}`;
        textDisplay.style.display = 'block';
    } else {
        textDisplay.textContent = '';
        textDisplay.style.display = 'none';
    }

    if (entry.url) {
        urlDisplay.href = entry.url;
        urlDisplay.textContent = `URL: ${entry.url}`;
        urlDisplay.style.display = 'block';
    } else {
        urlDisplay.removeAttribute('href');
        urlDisplay.textContent = '';
        urlDisplay.style.display = 'none';
    }

    renderStats(currentPositionUrl);
}

function applyFallback(reason) {
    setBoardPosition(fallbackEntry);
}

function parsePositionEntries(text) {
    return text
        .split(/\r?\n\s*\r?\n+/)
        .map((block) => block.trim())
        .filter(Boolean)
        .map((block) => {
            const entry = {};

            block
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean)
                .forEach((line) => {
                    const colonIndex = line.indexOf(':');
                    if (colonIndex === -1) {
                        return;
                    }

                    const key = line.slice(0, colonIndex).trim().toLowerCase();
                    const value = line.slice(colonIndex + 1).trim();

                    if (key === 'fen') {
                        // Intentionally ignored: positions are resolved from URL only.
                    } else if (key === 'text') {
                        entry.text = value;
                    } else if (key === 'url') {
                        entry.url = value;
                    }
                });

            return entry;
        })
        .filter((entry) => entry.url);
}

function parseLichessUrl(rawUrl) {
    try {
        const parsed = new URL(rawUrl);
        if (!parsed.hostname.includes('lichess.org')) {
            return null;
        }

        const gameId = parsed.pathname.split('/').filter(Boolean)[0];
        if (!gameId) {
            return null;
        }

        const hashMatch = parsed.hash.match(/#(\d+)/);
        const ply = hashMatch ? parseInt(hashMatch[1], 10) : null;
        return { gameId, ply };
    } catch {
        return null;
    }
}

async function getFenFromLichessUrl(lichessUrl) {
    const cachedFen = getCachedValue(fenCache, lichessUrl);
    if (cachedFen) {
        return cachedFen;
    }

    const parsed = parseLichessUrl(lichessUrl);
    if (!parsed) {
        throw new Error('Invalid Lichess URL');
    }

    const exportUrl = `https://lichess.org/game/export/${parsed.gameId}?pgnInJson=true&moves=true&tags=true&clocks=false&evals=false&opening=false`;
    const response = await fetch(exportUrl);
    if (!response.ok) {
        throw new Error('Could not load Lichess game export');
    }

    const game = await response.json();
    const initialFen = game.initialFen && game.initialFen !== 'startpos' ? game.initialFen : undefined;
    const chess = new Chess(initialFen);
    const moves = (game.moves || '').trim().split(/\s+/).filter(Boolean);
    const pliesToPlay = parsed.ply == null ? moves.length : Math.min(parsed.ply, moves.length);

    for (let i = 0; i < pliesToPlay; i++) {
        const played = chess.move(moves[i]);
        if (!played) {
            throw new Error('Could not replay moves from Lichess game');
        }
    }

    const resolvedFen = chess.fen();
    setCachedValue(fenCache, FEN_CACHE_KEY, lichessUrl, resolvedFen, CACHE_TTL_MS);
    return resolvedFen;
}

async function resolveEntryFen(entry) {
    if (!entry.url) {
        return null;
    }

    try {
        const fen = await getFenFromLichessUrl(entry.url);
        return { ...entry, fen };
    } catch {
        return null;
    }
}

async function getPositions() {
    if (cachedPositions) {
        return cachedPositions;
    }

    const response = await fetch('positions.txt', { cache: 'no-cache' });
    if (!response.ok) {
        throw new Error('Failed to load positions.txt');
    }

    const text = await response.text();
    const parsedEntries = parsePositionEntries(text);
    const resolvedEntries = await Promise.all(parsedEntries.map((entry) => resolveEntryFen(entry)));
    const positions = resolvedEntries.filter((entry) => entry && entry.fen);

    if (positions.length === 0) {
        throw new Error('No usable positions found in positions.txt');
    }

    cachedPositions = positions;
    return positions;
}

async function loadRandomPosition() {
    if (window.location.protocol === 'file:') {
        applyFallback('Using 3rd entry fallback; open with http://localhost to load positions.txt');
        return;
    }

    try {
        const positions = await getPositions();
        const randomEntry = positions[Math.floor(Math.random() * positions.length)];
        setBoardPosition(randomEntry);
    } catch (error) {
        // Fallback keeps the page functional if file loading fails.
        applyFallback('Using 3rd entry fallback; could not load positions.txt');
        console.error(error);
    }
}

loadBtn.addEventListener('click', loadRandomPosition);
loadRandomPosition();
</script>
</body>
</html>
